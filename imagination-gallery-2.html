<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imagination Gallery | The Tidy Magpie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --teal: #4a8b8c;
      --navy: #1a2a3a;
      --text: #3a3530;
    }

    body {
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      color: var(--text);
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid rgba(74,139,140,0.2);
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--teal), var(--navy));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    nav ul a {
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    nav ul a:hover { opacity: 1; }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      padding: 3.5rem 2rem 2rem;
    }

    .page-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      color: var(--navy);
      margin-bottom: 0.6rem;
    }

    .page-header p {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* ── GALLERY GRID ── */
    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 2rem 3rem 4rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .gallery-item {
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      aspect-ratio: 1 / 1;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    .gallery-item .hover-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1.5rem 1.2rem;
      background: linear-gradient(to top, rgba(26,42,58,0.75) 0%, transparent 100%);
      font-family: 'Instrument Serif', serif;
      font-size: 1.3rem;
      color: #fff;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .gallery-item:hover .hover-title {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.96);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 3px;
      animation: fadeIn 0.25s ease;
    }

    .lightbox-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.85);
      margin-top: 1.2rem;
      letter-spacing: 0.04em;
      font-style: italic;
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-size: 1.8rem;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: #fff; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(74,139,140,0.2);
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      nav { padding: 1rem 1.2rem; }
      nav ul { gap: 1.2rem; }
      .gallery { grid-template-columns: 1fr; padding: 1rem 1rem 3rem; }
      .page-header { padding: 2rem 1.2rem 1.2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">The Tidy Magpie</a>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="kitchen.html">Kitchen</a></li>
      <li><a href="bathroom.html">Bathroom</a></li>
      <li><a href="garden.html">Garden</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="imagination-gallery.html">Gallery</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>Imagination Gallery</h1>
    <p>Spaces we dream about</p>
  </header>

  <main class="gallery">

    <div class="gallery-item" onclick="openLightbox('images/concreteheaven.png', 'Concrete Heaven')">
      <img src="images/concreteheaven.png" alt="Minimalist concrete bedroom with canopy bed and mountain artwork" loading="lazy">
      <div class="hover-title">Concrete Heaven</div>
    </div>

    <div class="gallery-item" onclick="openLightbox('images/curvedoak.png', 'Curved Oak')">
      <img src="images/curvedoak.png" alt="Organic curved oak bedroom with forest views and plants" loading="lazy">
      <div class="hover-title">Curved Oak</div>
    </div>

    <!-- Add more images here following the same pattern -->

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-title" id="lightbox-title"></div>
  </div>

  <footer>
    <p>© 2026 The Tidy Magpie &nbsp;·&nbsp; thetidymagpie.com</p>
  </footer>

  <script>
    function openLightbox(src, title) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-img').alt = title;
      document.getElementById('lightbox-title').textContent = title;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Prevent lightbox close when clicking the image itself
    document.getElementById('lightbox-img').addEventListener('click', e => e.stopPropagation());
  </script>

</body>
</html>
